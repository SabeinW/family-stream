<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>FamilyStream</title>
    <meta name="description" content="Our private family streaming and photo library." />
    <meta name="theme-color" content="#040404" />

    <!-- PWA manifest (also injected by vite-plugin-pwa at build time) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ===== iOS "Add to Home Screen" support ===== -->
    <!-- Makes the app launch full-screen without Safari chrome -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Status bar style when launched from the Home Screen -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Title shown under the Home Screen icon -->
    <meta name="apple-mobile-web-app-title" content="FamilyStream" />
    <!-- The Home Screen icon itself (must be a real PNG at this path) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <!-- Prevents iOS from auto-detecting phone numbers/dates and styling them as links -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ===== Android / general PWA ===== -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-base-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
