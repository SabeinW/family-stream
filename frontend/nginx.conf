server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Family videos can be large — raise the default 1MB upload ceiling.
    client_max_body_size 5120M;

    # Service worker / manifest should never be aggressively cached.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # React Router SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API + streaming to the backend container.
    # Buffering is disabled so Range requests (video seeking) and large
    # uploads stream straight through instead of being held in memory.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
